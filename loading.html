<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vidlyra Halloween Fest 2026 - Loading</title>

<link rel="stylesheet" href="css/loading.css">

</head>

<body>

<!-- Background -->
<div class="background">

    <div class="red-glow"></div>

    <div class="fog fog1"></div>

    <div class="fog fog2"></div>

    <div class="lightning"></div>

    <div id="particles"></div>

</div>

<!-- Portal -->
<div id="portalContainer">

    <div id="portalGlow"></div>

    <div id="portalRing"></div>

</div>

<!-- Loading Content -->
<div class="container">

    <h1>VIDLYRA</h1>

    <h2>Halloween Fest 2026</h2>

    <p id="status">
        Initializing Halloween Realm...
    </p>

    <div class="progress">

        <div class="bar" id="bar"></div>

    </div>

    <div id="percent">
        0%
    </div>

</div>

<!-- Audio -->
<audio id="thunder" preload="auto">
    <source src="assets/thunder.mp3" type="audio/mpeg">
</audio>

<audio id="wind" loop preload="auto">
    <source src="assets/wind.mp3" type="audio/mpeg">
</audio>

<!-- JavaScript -->
<script src="js/loading.js"></script>

</body>
</html>
