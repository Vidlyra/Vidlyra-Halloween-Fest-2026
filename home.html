<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vidlyra Halloween Fest 2026</title>

<link rel="stylesheet" href="css/world.css">

</head>

<body>

<!-- =========================
     WORLD BACKGROUND
========================== -->

<div class="world">

    <div class="sky"></div>

    <div class="clouds"></div>

    <div class="lightning"></div>

    <div id="rain"></div>

    <div id="particles"></div>

    <div id="bats"></div>

    <div class="fog fog-back"></div>

    <!-- Vidlyra Emblem -->
    <div class="emblem">

        <div class="emblem-ring"></div>

        <div class="emblem-core"></div>

    </div>

    <!-- Castle -->
    <div class="castle">

        <div class="tower left"></div>

        <div class="tower center"></div>

        <div class="tower right"></div>

    </div>

    <!-- Forest -->
    <div class="forest"></div>

    <!-- Hidden Eyes -->
    <div class="eyes eye-left"></div>

    <div class="eyes eye-right"></div>

    <!-- Pumpkins -->
    <div class="pumpkin pumpkin1"></div>

    <div class="pumpkin pumpkin2"></div>

    <div class="pumpkin pumpkin3"></div>

    <!-- Front Fog -->
    <div class="fog fog-front"></div>

</div>

<!-- =========================
     HERO CONTENT
========================== -->

<section class="hero">

<div class="hero-box">

<h1>

VIDLYRA

</h1>

<h2>

HALLOWEEN FEST 2026

</h2>

<p>

Beyond the Veil

</p>

<div class="buttons">

<button id="enterButton">

🎃 Enter the Haunted Realm

</button>

<button id="aboutButton">

📜 Event Story

</button>

</div>

</div>

</section>

<!-- =========================
     HUD
========================== -->

<div class="hud">

<div class="hud-left">

<span>🎃 Quest: 0 / 13</span>

</div>

<div class="hud-right">

<span>⭐ Secrets Found: 0</span>

</div>

</div>

<!-- =========================
     FOOTER
========================== -->

<footer>

<p>

© 2026 Vidlyra Halloween Fest

</p>

</footer>

<!-- =========================
     AUDIO
========================== -->

<audio
id="ambient"
loop>

<source
src="assets/ambience.mp3.mp3"
type="audio/mpeg">

</audio>

<audio
id="thunder">

<source
src="assets/thunder.mp3"
type="audio/mpeg">

</audio>

<!-- =========================
     JAVASCRIPT
========================== -->

<script src="js/world.js"></script>

</body>
</html>
