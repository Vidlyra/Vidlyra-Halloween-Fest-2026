<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Vidlyra Halloween Fest 2026</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/rain.css">
</head>

<body>

    <!-- Background -->
    <div class="background"></div>
    <div class="background-layer"></div>

    <!-- Clouds -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- Forest -->
    <img
    src="assets/images/forest.svg.png"
    class="forest"
    alt="Forest">
    <img
    src="assets/images/pumpkin.png.png"
    class="pumpkin"
    alt="Pumpkin">

    <!-- Castle -->
    <div class="castle"></div>

    <!-- Fog -->
    <div class="fog fog-back"></div>
    <div class="fog fog-front"></div>

    <!-- Spider Webs -->
    <img src="assets/images/spider web.svg"
         class="web web-left"
         alt="Spider Web">

    <img src="assets/images/spider web 2.svg"
         class="web web-right"
         alt="Spider Web">

    <!-- Hanging Spider -->
    <img src="assets/images/Spider.svg"
         class="spider"
         alt="Spider">

    <!-- Ghosts -->
    <img src="assets/images/ghost.svg"
         class="ghost ghost1"
         alt="Ghost">

    <img src="assets/images/ghost 1.svg"
         class="ghost ghost2"
         alt="Ghost">

    <!-- Dynamic Effects -->
    <div id="batContainer"></div>
    <div id="leafContainer"></div>
    <div id="rain"></div>
    <svg id="lightning">

    <defs>

        <filter id="glow">

            <feGaussianBlur stdDeviation="3" result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

    </defs>

</svg>

    <!-- Hero -->
    <section class="hero">

        <h1>VIDLYRA</h1>

        <h2>Halloween Fest 2026</h2>

        <p>
            Enter the haunted world where every shadow hides a mystery.
        </p>

        <button id="enterBtn">
            Enter the World
        </button>
        
         

    </section> 
   
    
    <script src="js/main.js"></script>
    <script src="js/bats.js"></script>
    <script src="js/leaves.js"></script>
    <script src="js/rain.js"></script>
    
  <audio id="bgMusic" preload="auto" loop>
    <source src="assets/ambience.mp3" type="audio/mpeg">
</audio>
<audio id="thunderSound">
    <source src="assets/thunder.mp3" type="audio/mpeg">
</audio>

<audio id="buttonSound">
    <source src="assets/button.mp3" type="audio/mpeg">
</audio>  
</body>

</html>
